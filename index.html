<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Hub | Creative Directory</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="navbar">
        <div class="container">
            <h1 class="logo">Report<span class="gradient-text">Hub</span></h1>
            <p class="about-text">A beautiful directory for AI-generated notes and reports.</p>
        </div>
    </header>

    <main class="container" id="directory-container">
        </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Report Hub.</p>
        </div>
    </footer>

    <script>
        /* UPDATE THIS LIST WHEN YOU ADD NEW FILES */
        const myFolders = [
            {
                folderTitle: "Projects Directory",
                files: [
                    { name: "Risk Report 1", path: "./projects/Risk Report-saved-1.html" },
                    { name: "Risk Report 2", path: "./projects/Risk Report-saved-2.html" },
                    { name: "Risk Report 3", path: "./projects/Risk Report-saved-3.html" }
                ]
            },
            {
                folderTitle: "Financial Reports",
                files: [
                    { name: "Q1 Summary", path: "./financials/q1-summary.html" },
                    { name: "Budget Overview", path: "./financials/budget.html" }
                ]
            }
        ];

        /* THE BUILDER */
        const container = document.getElementById('directory-container');

        myFolders.forEach(folder => {
            const folderSection = document.createElement('section');
            folderSection.className = 'folder-section';

            const folderHeading = document.createElement('h2');
            folderHeading.className = 'folder-title gradient-text';
            folderHeading.innerText = folder.folderTitle;
            folderSection.appendChild(folderHeading);

            const grid = document.createElement('div');
            grid.className = 'file-grid';

            folder.files.forEach(file => {
                const card = document.createElement('a');
                card.className = 'file-card';
                card.href = file.path;
                
                card.innerHTML = `
                    <div class="icon-wrapper">
                        <div class="file-icon">✨</div>
                    </div>
                    <div class="file-name">${file.name}</div>
                    <div class="arrow">➔</div>
                `;
                grid.appendChild(card);
            });

            folderSection.appendChild(grid);
            container.appendChild(folderSection);
        });
    </script>
</body>
</html>
